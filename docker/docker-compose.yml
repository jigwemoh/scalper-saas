version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: scalper_postgres
    environment:
      POSTGRES_USER: scalper
      POSTGRES_PASSWORD: scalper_dev_pass
      POSTGRES_DB: scalper_saas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scalper -d scalper_saas"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: scalper_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    container_name: scalper_backend
    ports:
      - "8000:8000"
    env_file:
      - ../apps/backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../apps/backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  ai-engine:
    build:
      context: ../apps/ai-engine
      dockerfile: Dockerfile
    container_name: scalper_ai
    env_file:
      - ../apps/ai-engine/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../apps/ai-engine:/app

volumes:
  postgres_data:
  redis_data:
